<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Capi Admin Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050617;--card:#0b0e2a;--border:#1a1f4e;
  --cyan:#00d4ff;--pink:#ff5fa0;--purple:#bf5fff;--green:#00ff88;--orange:#ff8c00;
  --text:#e8eaff;--muted:#7a82b8;--danger:#ff4455;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh}
a{color:var(--cyan);text-decoration:none}

/* ── Layout ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;
  background:rgba(11,14,42,.95);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(8px);
}
.logo{font-size:18px;font-weight:800;letter-spacing:.5px}
.logo span{color:var(--cyan)}
.auth-form{display:flex;gap:10px;align-items:center}
.auth-form input{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;width:240px;
  outline:none;
}
.auth-form input:focus{border-color:var(--cyan)}
button{
  background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.35);
  color:var(--cyan);border-radius:8px;padding:8px 18px;font-size:13px;
  font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;
}
button:hover{background:rgba(0,212,255,.22);border-color:var(--cyan)}
button.danger{background:rgba(255,68,85,.1);border-color:rgba(255,68,85,.35);color:var(--danger)}
button.danger:hover{background:rgba(255,68,85,.2)}
button.export{background:rgba(0,255,136,.1);border-color:rgba(0,255,136,.35);color:var(--green)}
button.export:hover{background:rgba(0,255,136,.2)}
button:disabled{opacity:.4;cursor:not-allowed}

main{padding:28px;max-width:1400px;margin:0 auto}
.gate{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:16px;text-align:center;
}
.gate h2{font-size:22px;color:var(--muted)}
.hidden{display:none!important}

/* ── Stats cards ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:20px 22px;
}
.stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.stat-value{font-size:32px;font-weight:800;color:var(--cyan)}
.stat-sub{font-size:12px;color:var(--muted);margin-top:4px}

/* ── Charts row ── */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
@media(max-width:800px){.charts-row{grid-template-columns:1fr}}
.chart-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:22px;
}
.chart-card h3{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:18px;
  text-transform:uppercase;letter-spacing:.8px}
canvas{max-width:100%;display:block;margin:0 auto}

/* ── Bar chart (custom) ── */
.bar-list{display:flex;flex-direction:column;gap:12px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:120px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:22px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .6s ease;display:flex;align-items:center;padding-left:8px;font-size:12px;font-weight:700;color:#000}
.bar-count{width:36px;text-align:right;font-size:13px;font-weight:700}

/* ── Table ── */
.table-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;margin-bottom:28px;
}
.table-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap;
}
.table-toolbar h3{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
select{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;
  outline:none;cursor:pointer;
}
select:focus{border-color:var(--cyan)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:rgba(255,255,255,.03)}
th{padding:12px 14px;text-align:left;color:var(--muted);font-weight:600;
   font-size:11px;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;
   border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

.role-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;
  white-space:nowrap;
}
.role-Explorer   {background:rgba(0,212,255,.12);color:#00d4ff;border:1px solid rgba(0,212,255,.25)}
.role-Builder    {background:rgba(255,140,0,.12); color:#ff8c00;border:1px solid rgba(255,140,0,.25)}
.role-Operator   {background:rgba(0,255,136,.12); color:#00ff88;border:1px solid rgba(0,255,136,.25)}
.role-Connector  {background:rgba(191,95,255,.12);color:#bf5fff;border:1px solid rgba(191,95,255,.25)}
.role-Communicator{background:rgba(255,80,100,.12);color:#ff5064;border:1px solid rgba(255,80,100,.25)}

.mission-badge{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600;
  background:rgba(191,95,255,.1);color:var(--purple);border:1px solid rgba(191,95,255,.2);
}
.conf-dot{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:800;
  background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.25);color:var(--cyan);
}
.share-link{font-family:monospace;font-size:11px;color:var(--muted);
  max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}

/* ── Pagination ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;border-top:1px solid var(--border)}
.page-info{font-size:13px;color:var(--muted)}

/* ── Loading / empty states ── */
.loader{text-align:center;padding:48px;color:var(--muted);font-size:14px}
.loader::after{content:'';display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;margin-left:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--muted)}

/* ── Toast ── */
#toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:#0e1a3a;border:1px solid var(--cyan);border-radius:10px;
  padding:12px 20px;font-size:13px;color:var(--cyan);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
#toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <div class="logo">⚡ Capi <span>Admin</span></div>
  <div class="auth-form" id="auth-form">
    <input type="password" id="key-input" placeholder="Admin key…" autocomplete="current-password"/>
    <button onclick="login()">Đăng nhập</button>
  </div>
  <div class="hidden" id="logged-bar">
    <button class="export" onclick="exportCSV()">⬇ Export CSV</button>
    &nbsp;
    <button class="danger" onclick="logout()">Đăng xuất</button>
  </div>
</header>

<main>
  <!-- Gate screen -->
  <div class="gate" id="gate-screen">
    <h2>🔒 Nhập admin key để xem kết quả khảo sát</h2>
    <div style="display:flex;gap:10px">
      <input type="password" id="gate-key" placeholder="Admin key…" style="width:280px;padding:10px 16px;font-size:14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none" onkeydown="if(event.key==='Enter')login()"/>
      <button style="padding:10px 22px;font-size:14px" onclick="login()">Xác nhận</button>
    </div>
  </div>

  <!-- Dashboard (hidden until authenticated) -->
  <div class="hidden" id="dashboard">

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-label">Tổng lượt hoàn thành</div><div class="stat-value" id="s-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Confidence trung bình</div><div class="stat-value" id="s-conf">—</div><div class="stat-sub">/ 5</div></div>
      <div class="stat-card"><div class="stat-label">Role phổ biến nhất</div><div class="stat-value" id="s-top-role" style="font-size:18px">—</div></div>
      <div class="stat-card"><div class="stat-label">Mission phổ biến nhất</div><div class="stat-value" id="s-top-mission" style="font-size:18px">—</div></div>
    </div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="chart-card">
        <h3>Phân bổ Role</h3>
        <div class="bar-list" id="role-bars"></div>
      </div>
      <div class="chart-card">
        <h3>Phân bổ Mission</h3>
        <div class="bar-list" id="mission-bars"></div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-toolbar">
        <h3>Kết quả chi tiết</h3>
        <div class="filters">
          <select id="filter-role" onchange="applyFilters()">
            <option value="">Tất cả roles</option>
            <option>Explorer</option>
            <option>Builder</option>
            <option>Operator</option>
            <option>Connector</option>
            <option>Communicator</option>
          </select>
          <select id="filter-mission" onchange="applyFilters()">
            <option value="">Tất cả missions</option>
            <option value="m1">Mission 1</option>
            <option value="m2">Mission 2</option>
            <option value="m3">Mission 3</option>
            <option value="m4">Mission 4</option>
            <option value="m5">Mission 5</option>
            <option value="m6">Mission 6</option>
          </select>
          <button onclick="loadData()">🔄 Refresh</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Thời gian</th>
              <th>Role kết quả</th>
              <th>Mission</th>
              <th>Confidence</th>
              <th>P1 top</th>
              <th>P2 top</th>
              <th>P3 top</th>
              <th>Share</th>
            </tr>
          </thead>
          <tbody id="results-tbody">
            <tr><td colspan="9" class="loader">Đang tải dữ liệu</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination">
        <button onclick="prevPage()" id="btn-prev">← Trước</button>
        <span class="page-info" id="page-info"></span>
        <button onclick="nextPage()" id="btn-next">Tiếp →</button>
      </div>
    </div>

  </div><!-- /dashboard -->
</main>

<div id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────
const PAGE_SIZE = 50;

const ROLE_META = {
  Explorer:    {icon:'🔭', color:'#00d4ff'},
  Builder:     {icon:'🔨', color:'#ff8c00'},
  Operator:    {icon:'⚙️', color:'#00ff88'},
  Connector:   {icon:'🤝', color:'#bf5fff'},
  Communicator:{icon:'🎙️', color:'#ff5064'},
};

const MISSION_NAMES = {
  m1:'Mission 1 – Khám phá',
  m2:'Mission 2 – Xây dựng',
  m3:'Mission 3 – Vận hành',
  m4:'Mission 4 – Kết nối',
  m5:'Mission 5 – Truyền thông',
  m6:'Mission 6 – Lãnh đạo',
};

// ── State ───────────────────────────────────────────────────
let adminKey = sessionStorage.getItem('capi_admin_key') || '';
let currentOffset = 0;
let totalRows = 0;
let currentData = null;

// ── Auth ────────────────────────────────────────────────────
function login(){
  const k = (document.getElementById('key-input').value ||
             document.getElementById('gate-key').value || '').trim();
  if(!k){ toast('Vui lòng nhập admin key'); return; }
  adminKey = k;
  sessionStorage.setItem('capi_admin_key', k);
  currentOffset = 0;
  loadData();
}

function logout(){
  adminKey = '';
  sessionStorage.removeItem('capi_admin_key');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('gate-screen').classList.remove('hidden');
  document.getElementById('auth-form').classList.remove('hidden');
  document.getElementById('logged-bar').classList.add('hidden');
}

// Auto-login if key stored
if(adminKey){ loadData(); }

// ── Data loading ─────────────────────────────────────────────
async function loadData(){
  const role    = document.getElementById('filter-role')?.value    || '';
  const mission = document.getElementById('filter-mission')?.value || '';

  const params = new URLSearchParams({
    key: adminKey,
    limit: PAGE_SIZE,
    offset: currentOffset,
  });
  if(role)    params.set('role', role);
  if(mission) params.set('mission', mission);

  try{
    const res = await fetch(`/api/results?${params}`);
    if(res.status === 401){
      toast('Admin key không đúng — vui lòng thử lại');
      logout();
      return;
    }
    const data = await res.json();
    if(!data.ok) throw new Error(data.error);
    currentData = data;
    totalRows = data.stats?.total || 0;
    renderDashboard(data);
  }catch(err){
    console.error(err);
    toast('Lỗi tải dữ liệu: ' + err.message);
  }
}

function applyFilters(){
  currentOffset = 0;
  loadData();
}

// ── Render ───────────────────────────────────────────────────
function renderDashboard(data){
  // Show dashboard, hide gate
  document.getElementById('gate-screen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('auth-form').classList.add('hidden');
  document.getElementById('logged-bar').classList.remove('hidden');

  // Stats
  const st = data.stats || {};
  document.getElementById('s-total').textContent = st.total ?? 0;
  document.getElementById('s-conf').textContent  =
    st.avg_confidence ? parseFloat(st.avg_confidence).toFixed(1) : '—';

  const topRole = (data.roleDist || [])[0];
  if(topRole){
    const m = ROLE_META[topRole.final_role] || {};
    document.getElementById('s-top-role').textContent = (m.icon||'') + ' ' + topRole.final_role;
  }
  const topMission = (data.missionDist || [])[0];
  if(topMission){
    document.getElementById('s-top-mission').textContent =
      (MISSION_NAMES[topMission.mission_id] || topMission.mission_id) + ' (' + topMission.count + ')';
  }

  // Role bars
  renderBars('role-bars', data.roleDist || [], 'final_role', ROLE_META, r => ROLE_META[r]?.color || '#7a82b8');

  // Mission bars
  const missionMeta = {};
  Object.keys(MISSION_NAMES).forEach((k,i)=>{
    missionMeta[k]={ icon: ['🔭','🔨','⚙️','🤝','🎙️','👑'][i] };
  });
  renderBars('mission-bars', data.missionDist || [], 'mission_id',
    missionMeta, ()=>'#bf5fff', id => MISSION_NAMES[id] || id);

  // Table
  renderTable(data.rows || []);

  // Pagination
  updatePagination();
}

function renderBars(containerId, dist, keyField, meta, colorFn, labelFn){
  const el = document.getElementById(containerId);
  if(!dist.length){ el.innerHTML='<div class="empty">Chưa có dữ liệu</div>'; return; }
  const max = Math.max(...dist.map(d=>d.count), 1);
  el.innerHTML = dist.map(d=>{
    const key   = d[keyField];
    const pct   = Math.round((d.count / max) * 100);
    const color = colorFn(key);
    const label = labelFn ? labelFn(key) : key;
    const icon  = meta[key]?.icon || '';
    return `
      <div class="bar-row">
        <div class="bar-label" title="${label}">${icon} ${label}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${color};opacity:.85">${d.count}</div>
        </div>
        <div class="bar-count">${d.count}</div>
      </div>`;
  }).join('');
}

function renderTable(rows){
  const tbody = document.getElementById('results-tbody');
  if(!rows.length){
    tbody.innerHTML='<tr><td colspan="9" class="empty">Không có kết quả nào</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map((row, i) => {
    const rm = ROLE_META[row.final_role] || {};
    const p1top = topRole(row.p1_scores);
    const p2top = topRole(row.p2_scores);
    const p3top = topRole(row.p3_scores);
    const dt    = new Date(row.created_at).toLocaleString('vi-VN',{
      day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'
    });
    const shareUrl = row.share_hash
      ? `<a href="/#${row.share_hash}" target="_blank" class="share-link" title="${row.share_hash}">${row.share_hash.slice(0,12)}…</a>`
      : '<span class="share-link">—</span>';
    return `<tr>
      <td style="color:var(--muted)">${currentOffset + i + 1}</td>
      <td style="color:var(--muted);white-space:nowrap">${dt}</td>
      <td><span class="role-badge role-${row.final_role}">${rm.icon||''} ${row.final_role}</span></td>
      <td><span class="mission-badge">${MISSION_NAMES[row.mission_id] || row.mission_id}</span></td>
      <td>${row.confidence ? `<span class="conf-dot">${row.confidence}</span>` : '—'}</td>
      <td><span class="role-badge role-${p1top}">${ROLE_META[p1top]?.icon||''} ${p1top||'—'}</span></td>
      <td><span class="role-badge role-${p2top}">${ROLE_META[p2top]?.icon||''} ${p2top||'—'}</span></td>
      <td><span class="role-badge role-${p3top}">${ROLE_META[p3top]?.icon||''} ${p3top||'—'}</span></td>
      <td>${shareUrl}</td>
    </tr>`;
  }).join('');
}

function topRole(jsonStr){
  try{
    const obj = typeof jsonStr==='string' ? JSON.parse(jsonStr) : (jsonStr||{});
    const entries = Object.entries(obj).filter(([,v])=>v>0);
    if(!entries.length) return '';
    return entries.sort((a,b)=>b[1]-a[1])[0][0];
  }catch{ return ''; }
}

// ── Pagination ───────────────────────────────────────────────
function updatePagination(){
  const total   = parseInt(totalRows) || 0;
  const start   = currentOffset + 1;
  const end     = Math.min(currentOffset + PAGE_SIZE, total);
  document.getElementById('page-info').textContent =
    total ? `${start}–${end} / ${total}` : '0 kết quả';
  document.getElementById('btn-prev').disabled = currentOffset === 0;
  document.getElementById('btn-next').disabled = end >= total;
}

function prevPage(){
  if(currentOffset === 0) return;
  currentOffset = Math.max(0, currentOffset - PAGE_SIZE);
  loadData();
}
function nextPage(){
  currentOffset += PAGE_SIZE;
  loadData();
}

// ── Filters ──────────────────────────────────────────────────

// ── Export ───────────────────────────────────────────────────
function exportCSV(){
  if(!adminKey){ toast('Chưa đăng nhập'); return; }
  const url = `/api/export?key=${encodeURIComponent(adminKey)}`;
  const a = document.createElement('a');
  a.href = url; a.download = ''; a.click();
  toast('Đang tải file CSV…');
}

// ── Toast ────────────────────────────────────────────────────
function toast(msg, duration=3000){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), duration);
}

// ── Key-enter shortcut ───────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.activeElement.id==='key-input') login();
});
</script>
</body>
</html>
